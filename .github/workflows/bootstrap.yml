name: Bootstrap Android Flutter Project
on: [push, workflow_dispatch]
jobs:
  bootstrap:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Create Flutter Project
        run: |
          # Preserve the .git folder by being more specific with find
          find . -maxdepth 1 ! -name '.github' ! -name '.git' ! -name '.' -exec rm -rf {} +
          flutter create --org com.aman.ai --project-name new_3 --platforms android,web .
      - name: Commit and Push generated files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # If .git was somehow lost, re-init and link
          if [ ! -d ".git" ]; then
            git init
            git remote add origin https://x-access-token:$GITHUB_TOKEN@github.com/${{ github.repository }}.git
            git checkout -b main
          fi
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "actions@github.com"
          
          git add .
          # Only commit if there are changes to avoid empty commit errors
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Initialize project with org: com.aman.ai [skip ci]"
            # Force push to ensure the scaffold overwrites the empty initial state
            git push origin main --force
          fi
